[tool.ruff]
line-length = 150  

[tool.ruff.lint]
ignore = [
    "F403",  
    "F405",
]

[tool.pylint.messages_control]
disable = [
    "logging-fstring-interpolation",
	"too-many-arguments",
	"too-many-positional-arguments",
	"too-many-locals",
    "too-many-branches",
    "too-many-return-statements",
    "too-many-statements",
    "too-few-public-methods",
    "too-many-instance-attributes",
]

[tool.pylint.basic]
ignored-modules = ["tkinter"]

[tool.pylint.format]
max-line-length = 150  
