name: Build Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-windows:
    permissions:
        contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate version file
        run: uv run --group build python -c "from setuptools_scm import dump_version; dump_version(write_to='photo/_version.py')"
      
      - name: Build exe
        run: uv run --group build pyinstaller --clean -F --noconsole -i="icons/microscope.ico" --add-data "icons;icons" --name splitToWells window.py
      
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/splitToWells.exe

  build-macos:
    permissions:
        contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate version file
        run: uv run --group build python -c "from setuptools_scm import dump_version; dump_version(write_to='photo/_version.py')"
      
      - name: Build app
        run: |
          # Build the .app bundle using PyInstaller
          uv run --group build pyinstaller --clean --windowed -i="icons/microscope.ico" --add-data "icons:icons" --name splitToWells window.py
          
          # Use 'ditto' instead of 'zip' to preserve critical bundle symlinks and permissions
          cd dist
          ditto -c -k --sequesterRsrc --keepParent splitToWells.app splitToWells_mac.zip
      
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/splitToWells_mac.zip

  build-linux:
    permissions:
        contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate version file
        run: uv run --group build python -c "from setuptools_scm import dump_version; dump_version(write_to='photo/_version.py')"
      
      - name: Build executable
        run: uv run --group build pyinstaller --clean -F --noconsole --add-data "icons:icons" --name splitToWells window.py
      
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/splitToWells
