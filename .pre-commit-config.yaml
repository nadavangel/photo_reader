repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.9.9
  hooks:
    - id: ruff
      args: [--fix, --exit-non-zero-on-fix]
    - id: ruff-format
- repo: local
  hooks:
    - id: pylint
      name: pylint
      entry: uv run pylint
      language: system
      types: [python]
      args: [--rcfile=pyproject.toml]
